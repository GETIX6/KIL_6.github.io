<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[KIL_6] THE SHIELD - Технические работы</title>
  <style>
    :root {
      --primary: #00ff88;
      --dark: #0a0a0a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
      color: #eee;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .maintenance-container {
      max-width: 700px;
      padding: 3rem 2rem;
    }

    .logo {
      font-size: 4.5rem;
      margin-bottom: 1rem;
      color: var(--primary);
      text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
    }

    .title {
      font-size: 2.8rem;
      margin-bottom: 1.5rem;
      color: #fff;
    }

    .subtitle {
      font-size: 1.4rem;
      color: #aaa;
      margin-bottom: 3rem;
    }

    .status {
      display: inline-block;
      background: rgba(255, 68, 68, 0.15);
      color: #ff4444;
      padding: 12px 30px;
      border-radius: 50px;
      border: 2px solid #ff4444;
      font-weight: bold;
      margin-bottom: 3rem;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .message {
      font-size: 1.25rem;
      line-height: 1.8;
      color: #ccc;
      margin-bottom: 3rem;
    }

    .footer {
      color: #666;
      font-size: 1.1rem;
    }

    .icon {
      font-size: 6rem;
      margin-bottom: 2rem;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="maintenance-container">
    <div class="icon">🔧</div>
    
    <div class="logo">[KIL_6] THE SHIELD</div>
    <h1 class="title">Ведутся технические работы</h1>
    
    <div class="status">
      ● Сайт временно недоступен
    </div>

    <p class="message">
      <br><br>
      Сейчас на сайте проводятся плановые технические работы.<br>
    </p>

    <div class="footer">
      Спасибо за понимание <br>
      — Команда [KIL_6] THE SHIELD
    </div>
  </div>
</body>
</html>
